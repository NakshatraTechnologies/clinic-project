# ================================================
# Clinic App - Docker Compose (All Environments)
# ================================================
# Usage:
#   Production: docker compose up -d --build
#   (Use docker-compose.staging.yml for staging)
#   (Use docker-compose.prod.yml for production)
#
# This file runs BOTH staging and production
# on a single server. Useful for reference.
# ================================================

services:
  # ─────────────────────────────────
  # PRODUCTION
  # ─────────────────────────────────
  backend-prod:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: clinic-backend-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - PORT=5000
      - NODE_ENV=production
    ports:
      - "5000:5000"
    volumes:
      - prod-uploads:/app/uploads
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend-prod:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: https://api.clinic.yourdomain.com/api
    container_name: clinic-frontend-prod
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - clinic-network
    depends_on:
      backend-prod:
        condition: service_healthy

  # ─────────────────────────────────
  # STAGING
  # ─────────────────────────────────
  backend-staging:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: clinic-backend-staging
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      - PORT=5001
      - NODE_ENV=staging
    ports:
      - "5001:5001"
    volumes:
      - staging-uploads:/app/uploads
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend-staging:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: https://staging-api.clinic.yourdomain.com/api
    container_name: clinic-frontend-staging
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - clinic-network
    depends_on:
      backend-staging:
        condition: service_healthy

volumes:
  prod-uploads:
  staging-uploads:

networks:
  clinic-network:
    driver: bridge
